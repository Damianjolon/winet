<div class="contenedor-listado">
  <button mat-raised-button color="primary" (click)="abrirFormulario()">
    <mat-icon>add</mat-icon> Agregar Empleado
  </button>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width: 100%; margin-top: 20px;">
    <p>Listado cargado</p>
    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let empleado">{{ empleado.id }}</td>
    </ng-container>

    <!-- Nombre -->
    <ng-container matColumnDef="nombre_completo">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let empleado">{{ empleado.nombre_completo }}</td>
    </ng-container>

    <!-- Puesto -->
    <ng-container matColumnDef="puesto">
      <th mat-header-cell *matHeaderCellDef>Puesto</th>
      <td mat-cell *matCellDef="let empleado">{{ empleado.puesto }}</td>
    </ng-container>

    <!-- Salario -->
    <ng-container matColumnDef="salario">
      <th mat-header-cell *matHeaderCellDef>Salario</th>
      <td mat-cell *matCellDef="let empleado">{{ empleado.salario }}</td>
    </ng-container>

    <!-- Estado -->
    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef="let empleado">{{ empleado.estado }}</td>
    </ng-container>

    <!-- Acciones -->
    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let empleado">
        <button mat-icon-button color="accent" (click)="editarEmpleado(empleado)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="eliminarEmpleado(empleado.id)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

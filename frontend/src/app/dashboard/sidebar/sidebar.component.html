<mat-sidenav-container class="dashboard-container">
  <!-- Sidebar -->
  <mat-sidenav mode="side" opened class="dashboard-sidenav">
    <mat-toolbar color="primary">WINET</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="bienvenida" routerLinkActive="active">🏠 Home</a>
      <a mat-list-item routerLink="clientes" routerLinkActive="active">👥 Gestionar Clientes</a>
      <a mat-list-item routerLink="inventario" routerLinkActive="active">📦 Gestionar Inventario</a>
      <a mat-list-item routerLink="empleados" routerLinkActive="active">📂 Gestionar Empleados</a>
      <a mat-list-item routerLink="recibos" routerLinkActive="active">📂 Gestionar Recibos</a>
      <a mat-list-item (click)="logout()">🚪 Cerrar Sesión</a>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Contenido -->
  <mat-sidenav-content>
    <app-toolbar></app-toolbar>
    <div class="dashboard-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
